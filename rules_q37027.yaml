# SCLL Tool — Rules for project Q37027 (AHF Plant — ISBL)
# Input file: Q37027-02-A00-PE-LST-00010.xlsx  (sheet "Line List")
#
# Key differences from the generic rules.yaml template:
#   • Multi-row header → header row is Excel row 10 (0-indexed: 9); row 11 is units row (skip)
#   • Size stored in mm (Max Line Size column) → size_config.unit: "mm" with mm_to_nps lookup
#   • Scope: exclude MOC = "Not in Piping Scope" → mode: "column_exclude_values"
#   • MOC column used for material group (not PIPING MATERIAL CLASS)
#   • FROM/TO are full descriptive names → detection_mode: "keyword"
#   • Roman numeral output levels: I / II / III (set in output_config)

# ─────────────────────────────────────────────────────────────────────────────
# EXCEL FILE LAYOUT
# ─────────────────────────────────────────────────────────────────────────────
excel_config:
  sheet_name: "Line List"
  header_row: 9       # 0-indexed row that contains column names (Excel row 10)
  skip_rows: [10]     # skip row 11 (units row: "(mm)", "(Bar g)", etc.)

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUT FORMAT
# ─────────────────────────────────────────────────────────────────────────────
output_config:
  format: "jesa"                    # triggers output_jesa.py writer
  level_notation: "roman"           # I / II / III instead of Level 1/2/3
  project_name: "AHF PLANT PROJECT - ISBL"
  project_number: "Q37027"
  customer: "FLUOR ALPHA"
  document_number: "Q37027-02-A00-PE-LST-00010"

# ─────────────────────────────────────────────────────────────────────────────
# COLUMN MAPPINGS  (all headers stripped of leading/trailing whitespace by parser)
# ─────────────────────────────────────────────────────────────────────────────
column_mappings:
  # ── Classification-critical columns ──────────────────────────────────────
  line_number:          "NEW Line No."
  size:                 "Max Line Size"           # mm — see size_config below
  design_temperature:   "DESIGN TEMPERATURE - MAX"
  material:             "MOC"                     # HDPE/CS/CSG/SS/FRP/PTFECS
  from_equipment:       "FROM"
  to_equipment:         "TO"

  # ── Scope: column_exclude_values mode checks the 'material' column ──────
  # scope column left blank — filter uses mode: column_exclude_values instead
  scope:                ""

  # ── Pressure / flags ─────────────────────────────────────────────────────
  inlet_pressure:       "DESIGN PRESSURE - INTERNAL"
  relief_line:          "BLOWDOWN OR RELIEF LINE (Y / N)"
  vibration:            "SLUG FLOW (Y/N)"

  # ── Flags not present in this file — treated as all-False ────────────────
  vacuum:               ""
  settlement:           ""
  expansion_joint:      ""
  jacketed:             ""
  cement_lined:         ""
  vertical_tower:       ""
  ped_category_3:       ""
  nozzle_load_limit:    ""
  heavy_wall:           ""
  differential_settlement: ""
  cyclic_service:       ""
  category_m:           ""
  client_request:       ""
  underground:          ""
  schedule_160:         ""

  # ── Output-enriched columns (used by output_jesa.py) ─────────────────────
  stress_criticality:   "STRESS CRITICALITY (ANALYSIS LEVELS)"
  calculation_number:   "CALCULATION NUMBER"
  unit:                 "UNIT"
  area:                 "AREA"
  pipe_class:           "PIPING MATERIAL CLASS"
  fluid_service_code:   "FLUID SERVICE CODE"

# ─────────────────────────────────────────────────────────────────────────────
# SCOPE FILTER
# mode: "column_exclude_values" — checks the named column (by internal name)
# for any of the listed values (case-insensitive).  Matching rows are EXCLUDED.
# ─────────────────────────────────────────────────────────────────────────────
scope:
  mode: "column_exclude_values"
  column: "material"
  exclude_values:
    - "Not in Piping Scope"

# ─────────────────────────────────────────────────────────────────────────────
# SIZE UNIT CONVERSION
# Max Line Size column stores nominal pipe diameter in millimetres.
# Converted to NPS (inches) before chart lookup.
# Values not in the table → NEEDS REVIEW.
# ─────────────────────────────────────────────────────────────────────────────
size_config:
  unit: "mm"
  mm_to_nps:
    15:  0.5
    20:  0.75
    25:  1
    32:  1.25
    40:  1.5
    50:  2
    65:  2.5
    80:  3
    100: 4
    125: 5
    150: 6
    200: 8
    250: 10
    300: 12
    350: 14
    400: 16
    450: 18
    500: 20
    600: 24
    700: 28
    750: 30
    800: 32
    900: 36

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED COLUMNS (internal names)
# ─────────────────────────────────────────────────────────────────────────────
required_columns:
  - line_number
  - size
  - design_temperature
  - material

# ─────────────────────────────────────────────────────────────────────────────
# BOOLEAN FLAG PARSING
# ─────────────────────────────────────────────────────────────────────────────
true_values:
  - "Y"
  - "y"
  - "Yes"
  - "yes"
  - "YES"
  - "TRUE"
  - "true"
  - "True"
  - "1"
  - "X"
  - "x"

# ─────────────────────────────────────────────────────────────────────────────
# STEP 2 — EXCEPTION FLAGS
# Relief line: any blowdown/relief line → Level 1 (no pressure extra_condition
# because design pressure data in Q37027 is complete).
# ─────────────────────────────────────────────────────────────────────────────
exception_flags:
  - name: relief_line
    flag: relief_line
    extra_condition: null
    reason: "Blowdown or relief line → Level 1"

  - name: vibration
    flag: vibration
    extra_condition: null
    reason: "Slug flow / vibration service → Level 1"

  - name: cement_lined
    flag: cement_lined
    extra_condition: null
    reason: "Cement-brick, refractory, or glass-lined pipe → Level 1"

  - name: vertical_tower_large
    flag: vertical_tower
    extra_condition:
      field: size
      operator: ">="
      value: 4
    reason: "Vertical line connected to tower, diameter >= 4\" → Level 1"

  - name: jacketed
    flag: jacketed
    extra_condition: null
    reason: "Jacketed piping (differential temperature) → Level 1"

  - name: expansion_joint
    flag: expansion_joint
    extra_condition: null
    reason: "Line has expansion joint or flexible connector → Level 1"

  - name: settlement
    flag: settlement
    extra_condition: null
    reason: "Line subjected to settlement → Level 1"

  - name: ped_category_3_large
    flag: ped_category_3
    extra_condition:
      field: size
      operator: ">="
      value: 4
    reason: "PED Category III line, diameter >= 4\" → Level 1"

  - name: vacuum
    flag: vacuum
    extra_condition: null
    reason: "Vacuum service → Level 1"

  - name: underground_high_temp
    flag: underground
    extra_condition:
      field: design_temperature
      operator: ">="
      value: 100
    reason: "Underground piping with design temperature >= 100°C → Level 1"

  - name: nozzle_load_limit
    flag: nozzle_load_limit
    extra_condition: null
    reason: "Line attached to equipment with published nozzle load limitations → Level 1"

  - name: heavy_wall_large
    flag: heavy_wall
    extra_condition:
      field: size
      operator: ">="
      value: 2
    reason: "Heavy wall pipe, size >= 2\" → Level 1"

  - name: differential_settlement
    flag: differential_settlement
    extra_condition: null
    reason: "Line attached to equipment with differential settlement → Level 1"

  - name: cyclic_service
    flag: cyclic_service
    extra_condition: null
    reason: "Severe cyclic service or hydraulic shock → Level 1"

  - name: category_m
    flag: category_m
    extra_condition: null
    reason: "ASME B31.3 Category M fluid service → Level 1"

  - name: schedule_160
    flag: schedule_160
    extra_condition: null
    reason: "Schedule 160 pipe or OD/WT ratio < 10 → Level 1"

  - name: client_request
    flag: client_request
    extra_condition: null
    reason: "Client request → Level 1"

# ─────────────────────────────────────────────────────────────────────────────
# STEP 3 — STRAIN-SENSITIVE EQUIPMENT
#
# detection_mode: "keyword"
#   FROM/TO cells are full descriptive names:
#     e.g. "A11PM452 MOTHER LIQUOR PUMP", "A11HX231 LIGHTS COLUMN CONDENSER"
#   keyword_patterns: checked in order; first match wins. Case-insensitive.
#   non_strain_sensitive_keywords: equipment that is NOT strain-sensitive but
#     still triggers the chart_4 check.
# ─────────────────────────────────────────────────────────────────────────────
strain_sensitive_equipment:
  detection_mode: "keyword"

  keyword_patterns:
    - keywords: ["RECIPROCATING PUMP", "RECIPROCATING COMPRESSOR"]
      type: "reciprocating_pump"
      description: "Reciprocating pump or compressor"
    - keywords: ["VACUUM PUMP"]
      type: "centrifugal_pump"
      description: "Vacuum pump (treat as centrifugal for chart purposes)"
    - keywords: ["PUMP"]
      type: "centrifugal_pump"
      description: "Centrifugal pump"
    - keywords: ["COMPRESSOR"]
      type: "compressor"
      description: "Compressor"
    - keywords: ["TURBINE"]
      type: "turbine"
      description: "Turbine"
    - keywords: ["FIRED HEATER", "FURNACE", "BOILER"]
      type: "heater"
      description: "Fired heater / boiler"
    - keywords: ["AIR COOLER", "FIN FAN", "FIN-FAN", "AERIAL COOLER"]
      type: "air_cooler"
      description: "Air-cooled heat exchanger"
    - keywords: ["FAN", "BLOWER", "STRIPPER FAN"]
      type: "air_cooler"
      description: "Industrial fan / blower — rotating equipment with nozzle load limits"

  # Non-strain-sensitive equipment — triggers chart_4 check (Step 4).
  # Regular shell-and-tube coolers (HX prefix), reboilers, condensers, vessels, etc.
  non_strain_sensitive_keywords:
    - "TANK"
    - "TK"
    - "VESSEL"
    - "DRUM"
    - "CONTACTOR"
    - "SCRUBBER"
    - "SEPARATOR"
    - "COLUMN"
    - "FILTER"
    - "REACTOR"
    - "BASIN"
    - "SUMP"
    - "PIT"
    - "COOLER"
    - "CONDENSER"
    - "REBOILER"
    - "EXCHANGER"
    - "A11HX"
    - "HEADER"
    - "SAMPLING FROM"
    - "VENT COLLECTION"
    - "DRYER"
    - "AIR DRYER"
    - "EVAPORATOR"
    - "ABSORBER"
    - "HOPPER"

  # Chart 3 classification rules (from QW2507-00-PE-SPC-00007 spec — do not change)
  chart_3:
    - condition_type: "equip_type"
      equip_types: ["centrifugal_pump", "reciprocating_pump"]
      reason: "Connected to centrifugal/reciprocating pump → always Level 1"
      result: "Level 1"

    - condition_type: "temp_threshold"
      temp_operator: ">="
      temp_value: 100
      reason: "Strain-sensitive equipment connection, temperature >= 100°C → Level 1"
      result: "Level 1"

    - condition_type: "size_temp"
      size_operator: "<="
      size_value: 6
      temp_operator: ">="
      temp_value: 50
      reason: "Strain-sensitive equipment connection, size <= 6\", temperature 50–99°C → Level 2"
      result: "Level 2"

    - condition_type: "size_temp"
      size_operator: ">"
      size_value: 6
      temp_operator: "<"
      temp_value: 100
      reason: "Strain-sensitive equipment connection, size > 6\", temperature < 100°C → Level 2"
      result: "Level 2"

    - condition_type: "fallback"
      reason: "Strain-sensitive equipment connection, size <= 6\", temperature < 50°C → Level 3"
      result: "Level 3"

# ─────────────────────────────────────────────────────────────────────────────
# STEP 4 — MATERIAL CHARTS  (from QW2507-00-PE-SPC-00007)
# ─────────────────────────────────────────────────────────────────────────────

chart_1:
  description: "Carbon Steel / Low-Alloy Steel — Chart 1"
  size_bands:
    - max_size: 2
      l1_threshold: 300
      l2_threshold: 100
    - max_size: 3
      l1_threshold: 250
      l2_threshold: 100
    - max_size: 4
      l1_threshold: 250
      l2_threshold: 175
    - max_size: 6
      l1_threshold: 250
      l2_threshold: 175
    - max_size: 8
      l1_threshold: 250
      l2_threshold: 150
    - max_size: 10
      l1_threshold: 250
      l2_threshold: 100
    - max_size: 12
      l1_threshold: 250
      l2_threshold: 100
    - max_size: 14
      l1_threshold: 150
      l2_threshold: 50
    - max_size: 16
      l1_threshold: 150
      l2_threshold: 50
    - max_size: 9999
      l1_threshold: 50
      l2_threshold: 0

chart_2:
  description: "Stainless Steel / Duplex / Other Alloy Metals — Chart 2"
  size_bands:
    - max_size: 2
      l1_threshold: 250
      l2_threshold: 100
    - max_size: 3
      l1_threshold: 250
      l2_threshold: 175
    - max_size: 4
      l1_threshold: 200
      l2_threshold: 100
    - max_size: 6
      l1_threshold: 200
      l2_threshold: 100
    - max_size: 12
      l1_threshold: 200
      l2_threshold: 50
    - max_size: 9999
      l1_threshold: 100
      l2_threshold: 0

chart_4:
  description: "Non-strain-sensitive equipment connections — Chart 4"
  size_bands:
    - max_size: 3
      l1_threshold: 300
      l2_threshold: 175
    - max_size: 6
      l1_threshold: 300
      l2_threshold: 150
    - max_size: 9999
      l1_threshold: 250
      l2_threshold: 100

material_chart_map:
  CS:  "chart_1"
  SS:  "chart_2"
  FRP: null

# ─────────────────────────────────────────────────────────────────────────────
# CN ASSIGNMENT SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
cn_settings:
  project_code:       "Q37027"
  cn_number_format:   "CN-{number:03d}"    # CN-001 format (no project prefix per JESA convention)
  max_lines_per_cn:   15                   # soft flag — vent headers may exceed this
  temp_delta_flag:    80                   # °C — flag if connected lines differ by more than this

  # Area code: read from UNIT column (internal name mapped above)
  column_mapping:
    area_code: "unit"

  # Equipment prefix patterns for pump-first CN grouping (cn_assigner.py)
  # All pumps in Q37027 start with "A11PM" or "A11 PM" (with space variant)
  equipment_type_prefixes:
    centrifugal_pump:
      - "A11PM"
      - "A11 PM"
    reciprocating_pump: []
    compressor: []
    turbine: []

  cn_number_ranges:
    centrifugal_pump_start:    1
    compressor_turbine_start:  100
    equipment_system_start:    200
    area_group_start:          300
    unassigned_start:          900
