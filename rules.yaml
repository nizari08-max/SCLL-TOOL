# rules.yaml — JESA Stress Critical Line List engineering rules.
#
# This file holds ONLY the engineering spec: temperature/size thresholds, chart
# tables, exception flags, strain-sensitive equipment taxonomy, and CN grouping
# parameters. It is format-agnostic and applies to every project unchanged.
#
# Column names, scope filters, size units, and Excel layout are discovered at
# runtime by format_detector.py (using patterns in mapping.yaml). Do NOT add
# project-specific column names here.
#
# Engineers: edit this file to update the JESA spec. Do NOT edit the Python code.

# ─────────────────────────────────────────────────────────────────────────────
# BOOLEAN FLAG PARSING
# Cell values interpreted as True for all boolean flag columns (case-insensitive).
# ─────────────────────────────────────────────────────────────────────────────
true_values:
  - "Yes"
  - "Y"
  - "YES"
  - "TRUE"
  - "True"
  - "1"
  - "X"

# ─────────────────────────────────────────────────────────────────────────────
# SIZE CONVERSION (mm → NPS inches)
# Used when format_detector.py determines the size column is in mm.
# ─────────────────────────────────────────────────────────────────────────────
size_config:
  mm_to_nps:
    15:  0.5
    20:  0.75
    25:  1.0
    32:  1.25
    40:  1.5
    50:  2.0
    65:  2.5
    80:  3.0
    100: 4.0
    125: 5.0
    150: 6.0
    200: 8.0
    250: 10.0
    300: 12.0
    350: 14.0
    400: 16.0
    450: 18.0
    500: 20.0
    600: 24.0
    700: 28.0
    750: 30.0
    800: 32.0
    900: 36.0

# ─────────────────────────────────────────────────────────────────────────────
# STEP 2 — EXCEPTION FLAGS (any triggers → Level 1, per spec §3.2.5)
# Evaluated in listed order; first triggered exception wins.
# If the 'flag' column is absent from the uploaded file, the rule is skipped.
# ─────────────────────────────────────────────────────────────────────────────
exception_flags:
  - name: relief_line_high_pressure
    flag: relief_line
    extra_condition:
      field: inlet_pressure
      operator: ">"
      value: 10
    reason: "Relief line with inlet pressure > 10 barg → Level 1"

  - name: cement_lined
    flag: cement_lined
    extra_condition: null
    reason: "Cement-brick, refractory, or glass-lined pipe → Level 1"

  - name: vertical_tower_large
    flag: vertical_tower
    extra_condition:
      field: size
      operator: ">="
      value: 4
    reason: "Vertical line connected to tower, diameter >= 4\" → Level 1"

  - name: jacketed
    flag: jacketed
    extra_condition: null
    reason: "Jacketed piping (differential temperature) → Level 1"

  - name: expansion_joint
    flag: expansion_joint
    extra_condition: null
    reason: "Line has expansion joint or flexible connector → Level 1"

  - name: vibration
    flag: vibration
    extra_condition: null
    reason: "Line subjected to vibration or slug flow → Level 1"

  - name: settlement
    flag: settlement
    extra_condition: null
    reason: "Line subjected to differential settlement → Level 1"

  - name: ped_category_3_large
    flag: ped_category_3
    extra_condition:
      field: size
      operator: ">="
      value: 4
    reason: "PED Category III line, diameter >= 4\" → Level 1"

  - name: vacuum
    flag: vacuum
    extra_condition: null
    reason: "Vacuum service (stiffening rings required) → Level 1"

  - name: underground_high_temp
    flag: underground
    extra_condition:
      field: design_temperature
      operator: ">="
      value: 100
    reason: "Underground piping with design temperature >= 100°C → Level 1"

  - name: nozzle_load_limit
    flag: nozzle_load_limit
    extra_condition: null
    reason: "Equipment with published nozzle load limitations → Level 1"

  - name: heavy_wall_large
    flag: heavy_wall
    extra_condition:
      field: size
      operator: ">="
      value: 2
    reason: "Heavy wall pipe (> standard weight), size >= 2\" → Level 1"

  - name: cyclic_service
    flag: cyclic_service
    extra_condition: null
    reason: "Severe cyclic service (> 7000 cycles) or hydraulic shock → Level 1"

  - name: category_m
    flag: category_m
    extra_condition: null
    reason: "ASME B31.3 Category M fluid service → Level 1"

  - name: schedule_160
    flag: schedule_160
    extra_condition: null
    reason: "Schedule 160 pipe or OD/WT ratio < 10 (heavy wall) → Level 1"

  - name: client_request
    flag: client_request
    extra_condition: null
    reason: "Client request or Project Execution Plan requirement → Level 1"

# ─────────────────────────────────────────────────────────────────────────────
# STEP 3 — STRAIN-SENSITIVE EQUIPMENT
# Two detection methods — format_detector.py decides which one applies:
#   "tag_prefix" — FROM/TO holds short tag codes like "P-101"
#   "keyword"    — FROM/TO holds full names like "CONTRACTOR PUMP 02AP02"
# Keyword patterns live in mapping.yaml (equipment_keywords.*).
# ─────────────────────────────────────────────────────────────────────────────
strain_sensitive_equipment:
  tag_patterns:
    - prefix: "P-"
      type:   centrifugal_pump
    - prefix: "CP-"
      type:   centrifugal_pump
    - prefix: "RP-"
      type:   reciprocating_pump
    - prefix: "C-"
      type:   compressor
    - prefix: "K-"
      type:   compressor
    - prefix: "KC-"
      type:   compressor
    - prefix: "ST-"
      type:   turbine
    - prefix: "GT-"
      type:   turbine
    - prefix: "T-"
      type:   turbine
    - prefix: "H-"
      type:   heater
    - prefix: "F-"
      type:   heater
    - prefix: "B-"
      type:   heater
    - prefix: "E-A"
      type:   air_cooler
    - prefix: "AC-"
      type:   air_cooler
    - prefix: "EC-"
      type:   air_cooler

  # Chart 3 classification matrix for strain-sensitive equipment connections.
  # Evaluated in order; first matching condition wins.
  chart_3:
    - condition_type: equip_type
      equip_types:    [centrifugal_pump, reciprocating_pump]
      result:         "Level 1"
      reason:         "Connected to centrifugal/reciprocating pump → always Level 1"

    - condition_type: temp_threshold
      temp_operator:  ">="
      temp_value:     100
      result:         "Level 1"
      reason:         "Strain-sensitive equipment, temperature >= 100°C → Level 1"

    - condition_type: size_temp
      size_operator:  "<="
      size_value:     6
      temp_operator:  ">="
      temp_value:     50
      result:         "Level 2"
      reason:         "Strain-sensitive equipment, size <= 6\", temperature 50-99°C → Level 2"

    - condition_type: size_temp
      size_operator:  ">"
      size_value:     6
      temp_operator:  "<"
      temp_value:     100
      result:         "Level 2"
      reason:         "Strain-sensitive equipment, size > 6\", temperature < 100°C → Level 2"

    - condition_type: fallback
      result:         "Level 3"
      reason:         "Strain-sensitive equipment, size <= 6\", temperature < 50°C → Level 3"

# ─────────────────────────────────────────────────────────────────────────────
# STEP 4 — MATERIAL CHARTS
# Each chart is a list of size bands, evaluated top-to-bottom.
# The first band where size <= max_size is used.
# Within that band: Level 1 if temp > l1_threshold, Level 2 if temp > l2_threshold, else Level 3.
# max_size: 9999 = catch-all for larger sizes.
# ─────────────────────────────────────────────────────────────────────────────

chart_1:
  description: "Carbon Steel / Low-Alloy Steel — QW2507-00-PE-SPC-00007 Chart 1"
  size_bands:
    - {max_size: 2,    l1_threshold: 300, l2_threshold: 100}
    - {max_size: 3,    l1_threshold: 250, l2_threshold: 100}
    - {max_size: 4,    l1_threshold: 250, l2_threshold: 175}
    - {max_size: 6,    l1_threshold: 250, l2_threshold: 175}
    - {max_size: 8,    l1_threshold: 250, l2_threshold: 150}
    - {max_size: 10,   l1_threshold: 250, l2_threshold: 100}
    - {max_size: 12,   l1_threshold: 250, l2_threshold: 100}
    - {max_size: 14,   l1_threshold: 150, l2_threshold: 50}
    - {max_size: 16,   l1_threshold: 150, l2_threshold: 50}
    - {max_size: 9999, l1_threshold: 50,  l2_threshold: 0}

chart_2:
  description: "Stainless Steel / Duplex / Other Alloy Metals — Chart 2"
  size_bands:
    - {max_size: 2,    l1_threshold: 250, l2_threshold: 100}
    - {max_size: 3,    l1_threshold: 250, l2_threshold: 175}
    - {max_size: 4,    l1_threshold: 200, l2_threshold: 100}
    - {max_size: 6,    l1_threshold: 200, l2_threshold: 100}
    - {max_size: 12,   l1_threshold: 200, l2_threshold: 50}
    - {max_size: 9999, l1_threshold: 100, l2_threshold: 0}

chart_4:
  description: "Non-strain-sensitive equipment connections — Chart 4"
  size_bands:
    - {max_size: 3,    l1_threshold: 300, l2_threshold: 175}
    - {max_size: 6,    l1_threshold: 300, l2_threshold: 150}
    - {max_size: 9999, l1_threshold: 250, l2_threshold: 100}

# Maps material group → default chart when no equipment override applies.
# FRP short-circuits at Step 1, so no chart needed.
material_chart_map:
  CS:  chart_1
  SS:  chart_2
  FRP: null

# ─────────────────────────────────────────────────────────────────────────────
# CN ASSIGNMENT SETTINGS
# Only Level 1 lines get CNs. Sequential numbering CN-001, CN-002…
# CN-900+ is reserved for standalone / missing-data lines.
# ─────────────────────────────────────────────────────────────────────────────
cn_settings:
  max_lines_per_cn:   15      # flag (not split) CNs larger than this
  temp_delta_flag:    30      # split process consistency if delta T > this (°C)
  cn_number_format:   "CN-{number:03d}"     # {project_code} optional if UI supplies one

  # Equipment type prefixes for tag recognition (case-insensitive).
  # Used when FROM/TO contains short tag codes (e.g. P-101, RP-202A).
  # Matches tag.upper().startswith(prefix).
  equipment_type_prefixes:
    centrifugal_pump:   ["P-", "CP-"]
    reciprocating_pump: ["RP-"]
    compressor:         ["C-", "K-", "KC-"]
    turbine:            ["T-", "ST-", "GT-"]
    air_cooler:         ["A-", "ACC-", "ACE-", "E-A"]
    vessel:             ["V-", "D-", "TK-", "VE-"]
    exchanger:          ["E-", "HE-", "X-"]
    heater:             ["H-", "F-"]
